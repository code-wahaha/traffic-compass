<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>流量罗盘 · 发布前体检 + 发布后对账</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root{
    --bg:#0a0a0b; --panel:#161618; --panel2:#1d1d20; --line:#2a2a2e;
    --text:#ececf1; --dim:#8a8a93; --accent:#5b8cff;
    --high:#ff5c5c; --mid:#ffb347; --low:#9aa0a6; --ok:#33d17a;
  }
  html,body{height:100%;}
  body{ background:var(--bg); color:var(--text);
    font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    display:flex; flex-direction:column; align-items:center; }
  .wrap{ width:100%; max-width:860px; flex:1; display:flex; flex-direction:column;
    padding:20px 16px 0; min-height:0;}
  .hd{ text-align:center; padding:10px 0 4px;}
  .hd h1{ font-size:20px; font-weight:600; letter-spacing:.5px;}
  .hd p{ color:var(--dim); font-size:13px; margin-top:5px;}

  /* tabs */
  .tabs{ display:flex; gap:8px; justify-content:center; margin:14px 0 10px;}
  .tab{ padding:9px 18px; border-radius:12px; font-size:14px; cursor:pointer; user-select:none;
    background:var(--panel); border:1px solid var(--line); color:var(--dim); position:relative;}
  .tab.on{ background:#20293f; border-color:#31425f; color:var(--text); font-weight:600;}
  .tab .dot{ display:none; width:8px; height:8px; border-radius:50%; background:var(--high);
    position:absolute; top:-3px; right:-3px;}
  .tab.due .dot{ display:block;}
  .clearbar{ display:flex; justify-content:flex-end; margin-bottom:4px;}
  .clearbtn{ background:none; border:none; color:#5a5a62; font-size:12px; cursor:pointer; padding:4px 6px;}
  .clearbtn:hover{ color:var(--high);}

  .view{ flex:1; display:none; flex-direction:column; min-height:0;}
  .view.on{ display:flex;}

  #msgs{ flex:1; overflow-y:auto; padding:8px 4px 12px; display:flex; flex-direction:column; gap:16px;}
  .msg{ max-width:92%; padding:14px 16px; border-radius:14px; font-size:14.5px; line-height:1.7; white-space:pre-wrap; word-break:break-word; position:relative;}
  .copybtn{ position:absolute; top:6px; right:6px; background:#0e0e10; border:1px solid var(--line);
    color:var(--dim); border-radius:7px; padding:2px 8px; font-size:11.5px; cursor:pointer;
    opacity:0; transition:opacity .15s; user-select:none;}
  .msg:hover .copybtn{ opacity:1;}
  .copybtn:hover{ color:var(--text); border-color:var(--accent);}
  .me{ align-self:flex-end; background:#243049; border:1px solid #31425f;}
  .bot{ align-self:flex-start; background:var(--panel); border:1px solid var(--line);}
  .empty{ color:var(--dim); text-align:center; margin:auto 0; font-size:15px;}

  /* report */
  .rep h3{ font-size:14px; margin:14px 0 8px; color:#cfd2dc; border-left:3px solid var(--accent); padding-left:8px;}
  .rep h3:first-child{margin-top:0;}
  table.hits{ width:100%; border-collapse:collapse; font-size:13px; margin:6px 0;}
  table.hits td,table.hits th{ border:1px solid var(--line); padding:6px 8px; text-align:left;}
  table.hits th{ color:var(--dim); font-weight:500;}
  .tag{ display:inline-block; padding:1px 8px; border-radius:10px; font-size:12px;}
  .t-high{ background:rgba(255,92,92,.15); color:var(--high);}
  .t-mid{ background:rgba(255,179,71,.15); color:var(--mid);}
  .t-low{ background:rgba(154,160,166,.15); color:var(--low);}
  mark.hl-high{ background:rgba(255,92,92,.38); color:#fff; border-radius:3px; padding:0 1px;}
  mark.hl-mid{ background:rgba(255,179,71,.32); color:#fff; border-radius:3px; padding:0 1px;}
  mark.hl-low{ background:rgba(154,160,166,.30); color:#fff; border-radius:3px; padding:0 1px;}
  .annot{ background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:10px 12px; font-size:14px; line-height:1.95; max-height:280px; overflow:auto; white-space:pre-wrap; word-break:break-word;}
  .annot .none{ color:var(--ok);}
  .verdict{ font-weight:600; padding:8px 10px; border-radius:8px; background:var(--panel2); margin:6px 0;}
  .wl{ color:var(--ok); font-size:13px;}
  .pred .rng{ font-size:18px; font-weight:600; color:#fff;}
  .disc{ color:var(--dim); font-size:12px; margin-top:8px; font-style:italic;}
  ul.weak{ margin:6px 0 0 18px; font-size:13px;}
  ul.weak li{ color:#e0b070; margin:2px 0;}
  ul.good{ margin:6px 0 0 18px; font-size:13px;}
  ul.good li{ color:#7fd6a0; margin:2px 0;}
  .dims{ margin:8px 0;}
  .dimrow{ display:flex; align-items:center; gap:8px; margin:3px 0; font-size:12.5px;}
  .dimn{ width:46px; color:var(--dim);}
  .dimbar{ flex:1; height:7px; background:var(--panel2); border-radius:4px; overflow:hidden;}
  .dimbar i{ display:block; height:100%; background:linear-gradient(90deg,#5b8cff,#33d17a);}
  .dimv{ width:26px; text-align:right; color:var(--dim);}

  /* input */
  .inputwrap{ position:sticky; bottom:0; width:100%; padding:10px 0 20px; background:linear-gradient(transparent,var(--bg) 30%);}
  .card{ background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:12px 14px;}
  textarea#in, textarea#pin{ width:100%; background:transparent; border:none; color:var(--text); font-size:15px;
    resize:none; outline:none; min-height:46px; max-height:180px; height:46px; font-family:inherit; line-height:1.6;}
  textarea#in::placeholder, textarea#pin::placeholder{ color:#6a6a72;}
  .row{ display:flex; align-items:center; gap:8px; margin-top:6px;}
  .spacer{ flex:1;}
  .ddwrap{ position:relative;}
  .dd{ display:flex; align-items:center; gap:6px; background:var(--panel2); border:1px solid var(--line);
    padding:6px 10px; border-radius:10px; cursor:pointer; font-size:13.5px; user-select:none;}
  .menu{ position:absolute; bottom:42px; left:0; background:#0e0e10; border:1px solid var(--line);
    border-radius:12px; padding:6px; min-width:180px; box-shadow:0 12px 40px rgba(0,0,0,.6); display:none;}
  .menu.open{ display:block;}
  .mi{ padding:9px 10px; border-radius:8px; font-size:14px; display:flex; align-items:center; justify-content:space-between; cursor:pointer;}
  .mi:hover{ background:var(--panel2);}
  .mi.dis{ color:#5a5a62; cursor:not-allowed;}
  .mi .soon{ font-size:11px; color:#5a5a62;}
  .mi.sel{ color:var(--accent);}
  .iconbtn{ width:34px; height:34px; border-radius:9px; border:1px solid var(--line); background:var(--panel2);
    color:var(--dim); cursor:pointer; font-size:15px; display:flex; align-items:center; justify-content:center;}
  .iconbtn:hover{ color:var(--text);}
  .send{ background:var(--accent); border:none; color:#fff;}

  /* 发布后 · 对账台 */
  #postBody{ flex:1; overflow-y:auto; padding:4px 2px 30px;}
  .accbar{ background:var(--panel); border:1px solid var(--line); border-radius:14px;
    padding:12px 16px; margin-bottom:14px; font-size:13.5px; display:flex; flex-wrap:wrap; gap:6px 18px;}
  .accbar b{ color:#fff;}
  .accbar .k{ color:var(--dim);}
  .dgroup{ margin-bottom:18px;}
  .dgroup h4{ font-size:13px; color:var(--dim); margin-bottom:8px; font-weight:500;}
  .witem{ background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:11px 13px; margin-bottom:8px; font-size:13px;}
  .witem .wt{ color:#cfd2dc; margin-bottom:6px; line-height:1.5;}
  .witem .wm{ color:var(--dim); font-size:12px; margin-bottom:4px;}
  .witem input{ background:var(--panel2); border:1px solid var(--line); color:var(--text);
    border-radius:7px; padding:6px 8px; font-size:12.5px; width:100%; margin:3px 0;}
  .witem .nums{ display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:4px;}
  .btn{ background:var(--accent); border:none; color:#fff; border-radius:8px; padding:6px 12px;
    font-size:12.5px; cursor:pointer; margin-top:6px;}
  .btn.ghost{ background:var(--panel2); border:1px solid var(--line); color:var(--text);}
  .btn:disabled{ opacity:.45; cursor:not-allowed;}
  .pcard{ margin-top:6px;}
  .pcard .lock{ display:inline-block; font-size:11.5px; color:var(--mid); border:1px solid rgba(255,179,71,.4);
    border-radius:8px; padding:1px 8px; margin-left:8px; vertical-align:middle;}
  .brow{ display:flex; align-items:center; gap:8px; margin:4px 0; font-size:12.5px;}
  .bn{ width:56px; color:var(--dim); text-align:right;}
  .bbar{ flex:1; height:14px; background:var(--panel2); border-radius:4px; overflow:hidden; position:relative;}
  .bbar i{ display:block; height:100%; background:#3a4a6b;}
  .brow.pick .bbar i{ background:linear-gradient(90deg,#5b8cff,#33d17a);}
  .brow.pick .bn{ color:var(--accent); font-weight:600;}
  .bv{ width:34px; color:var(--dim);}
  .brow .hitmark{ position:absolute; top:-2px; bottom:-2px; width:3px; background:var(--high); border-radius:2px; left:50%;}
  .devbig{ font-size:19px; font-weight:700; margin:8px 0 2px;}
  .accform label{ display:block; font-size:12.5px; color:var(--dim); margin:8px 0 3px;}
  .accform input{ width:100%; background:var(--panel2); border:1px solid var(--line);
    color:var(--text); border-radius:8px; padding:7px 9px; font-size:13.5px;}
  #postDetail .msg{ max-width:100%; margin-bottom:12px;}

  /* 发布后 · 表格账本 */
  .wtable{ width:100%; border-collapse:collapse; font-size:12.5px; margin-bottom:16px;}
  .wtable th{ color:var(--dim); font-weight:500; text-align:left; padding:8px; border-bottom:1px solid var(--line); font-size:12px; white-space:nowrap;}
  .wtable td{ padding:10px 8px; border-bottom:1px solid #1c1c1f; vertical-align:middle;}
  .wtable tr.wrow:hover td{ background:#131316;}
  .st{ display:inline-block; padding:2px 9px; border-radius:9px; font-size:11.5px; white-space:nowrap;}
  .st-wait{ background:rgba(91,140,255,.12); color:var(--accent);}
  .st-pub{ background:rgba(154,160,166,.12); color:var(--low);}
  .st-due{ background:rgba(255,92,92,.14); color:var(--high);}
  .st-hit{ background:rgba(51,209,122,.12); color:var(--ok);}
  .st-miss{ background:rgba(255,179,71,.14); color:var(--mid);}
  .wtable .sm{ color:var(--dim); font-size:11.5px; margin-top:2px;}
  .abtn{ background:var(--panel2); border:1px solid var(--line); color:var(--text); border-radius:7px; padding:4px 10px; font-size:12px; cursor:pointer; white-space:nowrap;}
  .abtn:hover{ border-color:var(--accent);}
  .abtn.primary{ background:var(--accent); border-color:var(--accent); color:#fff;}
  .retroRow td{ background:#131316;}
  .retroRow .nums{ display:flex; gap:6px; flex-wrap:wrap; align-items:center;}
  .retroRow input{ background:var(--panel2); border:1px solid var(--line); color:var(--text); border-radius:7px; padding:6px 8px; font-size:12.5px; width:104px;}
  #postMsgs{ display:flex; flex-direction:column; gap:12px; padding:6px 2px 12px;}
  #postMsgs .msg{ max-width:92%;}
  .clearbar{ gap:10px;}
/* 右下角抖音登录小按钮 */
.dychip{position:fixed;right:14px;bottom:14px;z-index:99;background:#21262d;border:1px solid #30363d;
  color:#c9d1d9;padding:6px 13px;border-radius:16px;font-size:12px;cursor:pointer;user-select:none}
.dychip:hover{background:#30363d}
.dychip.ok{color:#3fb950;border-color:#2ea043;cursor:default}
</style>
</head>
<body>
<div class="wrap">
  <div class="hd">
    <h1>🧭 流量罗盘</h1>
    <p>发布前体检预测，发布后回来对账 —— 预测准不准，有账可查</p>
  </div>

  <div class="tabs">
    <div class="tab on" id="tabPre" onclick="switchTab('pre')">📝 发布前 · 体检与预测</div>
    <div class="tab" id="tabPost" onclick="switchTab('post')">📊 发布后 · 对账与成绩<span class="dot"></span></div>
  </div>

  <!-- ============ 框架一：发布前（聊天） ============ -->
  <div class="view on" id="view-pre">
    <div class="clearbar"><button class="clearbtn" onclick="clearPre()">🧹 清空对话（不影响预测档案）</button></div>
    <div id="msgs"><div class="empty">选好平台，把文案粘进下面 👇</div></div>
    <div class="inputwrap">
      <div class="card">
        <textarea id="in" placeholder="粘贴抖音视频文案，或视频分享链接…"></textarea>
        <div class="row">
          <div class="ddwrap">
            <div class="dd" id="dd"><span id="ddname">抖音</span><span style="color:var(--dim)">▾</span></div>
            <div class="menu" id="menu"></div>
          </div>
          <button class="iconbtn" id="attachBtn" title="上传文案文件（.txt）">📎</button>
          <input type="file" id="file" accept=".txt,.md,text/plain" style="display:none">
          <div class="spacer"></div>
          <button class="iconbtn send" id="send" title="发送">→</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ============ 框架二：发布后（对账台 + 复盘教练） ============ -->
  <div class="view" id="view-post">
    <div class="clearbar">
      <button class="clearbtn" style="color:#7d8aa5" onclick="location.href='/api/export?format=csv'" title="下载 CSV 表格，Excel/WPS 双击就能打开">💾 导出账本(Excel)</button>
      <button class="clearbtn" style="color:#7d8aa5" onclick="location.href='/api/export?format=json'" title="全量数据备份，换电脑恢复用">🗂 完整备份</button>
      <button class="clearbtn" onclick="clearPost()">🧹 清空复盘对话</button>
      <button class="clearbtn" onclick="resetAll()">♻️ 清空全部记录</button>
    </div>
    <div id="postBody">
      <div class="accbar" id="accbar" style="display:none"></div>
      <div id="postGroups"><div class="empty" style="margin:60px 0">还没有记录。去「发布前」自查一条文案并锁定盲预测，账本从那一刻开始。</div></div>
      <div id="postDetail"></div>
      <div id="postMsgs"></div>
    </div>
    <div class="inputwrap">
      <div class="card">
        <textarea id="pin" placeholder="问复盘教练：为什么这条没起来？连着偏低说明什么？下一条怎么调？"></textarea>
        <div class="row">
          <span style="color:#5a5a62;font-size:12px">🎓 复盘教练 · 它看得到你上面的全部对账记录</span>
          <div class="spacer"></div>
          <button class="iconbtn send" id="psend" title="发送">→</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
let platform = "douyin", platformName = "抖音";
let lastReportCtx = "", chatHistory = [];
let lastAuditText = "", lastAuditData = null, currentAccount = null;

const b64e = s => btoa(unescape(encodeURIComponent(s||"")));
const b64d = s => { try{ return decodeURIComponent(escape(atob(s||""))); }catch(e){ return ""; } };
const esc = s => (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const fmtNum = n => { n=Number(n)||0; return n>=10000? (n/10000).toFixed(1).replace(/\.0$/,"")+"w" : String(n); };

/* ============ tab 切换 ============ */
function switchTab(t){
  $("#tabPre").classList.toggle("on", t==="pre");
  $("#tabPost").classList.toggle("on", t==="post");
  $("#view-pre").classList.toggle("on", t==="pre");
  $("#view-post").classList.toggle("on", t==="post");
  if(t==="post") refreshPost();
}

/* ============ 框架一：聊天 + 记忆 ============ */
function attachCopy(d){
  if(d.querySelector(":scope > .copybtn")) return;
  const b=document.createElement("button"); b.className="copybtn"; b.textContent="⧉ 复制";
  b.onclick=e=>{
    e.stopPropagation();
    const c=d.cloneNode(true); c.querySelectorAll(".copybtn").forEach(x=>x.remove());
    const text=c.innerText.trim();
    const done=()=>{ b.textContent="✓ 已复制"; setTimeout(()=>b.textContent="⧉ 复制",1200); };
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(done).catch(()=>{ fallbackCopy(text); done(); });
    } else { fallbackCopy(text); done(); }
  };
  d.appendChild(b);
}
function fallbackCopy(text){
  const t=document.createElement("textarea"); t.value=text; t.style.position="fixed"; t.style.opacity="0";
  document.body.appendChild(t); t.select(); document.execCommand("copy"); t.remove();
}
function add(cls, html, save){
  const m=$("#msgs"); const e=m.querySelector(".empty"); if(e)e.remove();
  const d=document.createElement("div"); d.className="msg "+cls; d.innerHTML=html;
  attachCopy(d);
  m.appendChild(d); m.scrollTop=m.scrollHeight;
  if(save) saveMsg(cls, html);
  return d;
}
function saveMsg(role, html){
  fetch("/api/chatlog",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({frame:"pre", role, html})}).catch(()=>{});
}
function finishMsg(el, role, html){ el.innerHTML=html; attachCopy(el); saveMsg(role, html); }

async function restoreChat(){
  try{
    const j=await fetch("/api/chatlog?frame=pre").then(r=>r.json());
    if(j.success && j.data.length){
      const m=$("#msgs"); m.innerHTML="";
      j.data.forEach(x=>{ const d=document.createElement("div"); d.className="msg "+x.role; d.innerHTML=x.html; attachCopy(d); m.appendChild(d); });
      m.scrollTop=m.scrollHeight;
    }
  }catch(e){}
}
async function clearPre(){
  if(!confirm("清空「发布前」的对话记录？（作品与预测档案不受影响）")) return;
  await fetch("/api/chatlog?frame=pre",{method:"DELETE"});
  $("#msgs").innerHTML='<div class="empty">选好平台，把文案粘进下面 👇</div>';
  lastReportCtx=""; chatHistory=[]; lastAuditText=""; lastAuditData=null;
}

/* ============ 平台下拉 / 附件 / 输入 ============ */
fetch("/api/platforms").then(r=>r.json()).then(j=>{ buildMenu(j.data||[]); });
function buildMenu(data){
  const menu=$("#menu"); menu.innerHTML="";
  data.forEach(p=>{
    const d=document.createElement("div");
    d.className="mi"+(p.enabled?"":" dis")+(p.id===platform?" sel":"");
    d.innerHTML=`<span>${p.name}</span>`+(p.enabled?(p.id===platform?'<span>✓</span>':''):'<span class="soon">即将支持</span>');
    if(p.enabled){ d.onclick=()=>{platform=p.id;platformName=p.name;$("#ddname").textContent=p.name;closeMenu();buildMenu(data);}; }
    menu.appendChild(d);
  });
}
const closeMenu=()=>$("#menu").classList.remove("open");
$("#dd").onclick=e=>{e.stopPropagation();$("#menu").classList.toggle("open");};
document.onclick=()=>closeMenu();
$("#menu").onclick=e=>e.stopPropagation();
$("#attachBtn").onclick=()=>$("#file").click();
$("#file").onchange=e=>{ const f=e.target.files[0]; if(!f)return;
  const rd=new FileReader(); rd.onload=()=>{ $("#in").value=rd.result; autresize(); }; rd.readAsText(f); };
const ta=$("#in");
function autresize(){ ta.style.height="auto"; ta.style.height=Math.min(ta.scrollHeight,180)+"px"; }
ta.addEventListener("input",autresize);
ta.addEventListener("keydown",e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();go();} });
$("#send").onclick=go;

/* ============ 自查主流程 ============ */
async function go(){
  const text=ta.value.trim(); if(!text)return;
  add("me", esc(text), true);
  ta.value=""; autresize();
  const looksLink = /^https?:\/\//i.test(text) || /v\.douyin\.com|douyin\.com|xhslink|xiaohongshu/i.test(text);
  const isNewWork = looksLink || !lastReportCtx || text.length>100;
  const waiting=add("bot", isNewWork? "正在分析…" : "思考中…");
  try{
    if(isNewWork){
      let content=text;
      if(looksLink){
        waiting.innerHTML="🔗 正在提取视频文案（约 30~90 秒）…";
        const ex=await fetch("/api/extract",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({share_url:text})}).then(r=>r.json());
        if(!ex.success){ finishMsg(waiting,"bot","🔗 "+esc(ex.message)); return; }
        content=ex.data.text;
        add("bot","📄 已提取文案："+esc(content.slice(0,120))+(content.length>120?"…":""), true);
      }
      const j=await fetch("/api/audit",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({platform, text:content})}).then(r=>r.json());
      if(!j.success){ finishMsg(waiting,"bot","⚠️ "+esc(j.message)); return; }
      finishMsg(waiting,"bot",render(j.data));
      lastReportCtx=buildCtx(j.data); chatHistory=[];
      lastAuditText=content; lastAuditData=j.data;
      const btnHtml=`<span style='color:var(--dim);font-size:13px'>💬 可继续追问改写；确定要发这版了就👇</span><br>`+
        `<button class="btn" style="margin-top:8px" data-t="${b64e(content)}" data-a="${b64e(JSON.stringify({verdict:j.data.verdict,score:j.data.score}))}" onclick="startPredictBtn(this)">🔮 锁定盲预测（发布前）</button>`;
      add("bot", btnHtml, true);
    } else {
      chatHistory.push({role:"user",content:text});
      const j=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({messages:chatHistory, report_context:lastReportCtx, platform})}).then(r=>r.json());
      if(!j.success){ finishMsg(waiting,"bot","⚠️ "+esc(j.message)); return; }
      chatHistory.push({role:"assistant",content:j.data.reply});
      finishMsg(waiting,"bot",esc(j.data.reply).replace(/\n/g,"<br>"));
    }
  }catch(err){ finishMsg(waiting,"bot","⚠️ 请求失败："+esc(String(err))); }
}
function buildCtx(d){
  const sc=d.score||{};
  let c="平台:"+d.platform+"\n校正后文案:"+(d.corrected_text||"").slice(0,600);
  c+="\n违规:"+((d.violations||[]).map(v=>v.text+"("+v.severity+":"+v.category+")").join("、")||"无");
  c+="\n总评:"+d.verdict;
  c+="\n流量潜力:"+(sc.total||0)+"% "+(sc.level||"")+" 维度"+JSON.stringify(sc.dims||{});
  c+="\n亮点:"+((d.highlights||[]).join("；"))+"\n改进:"+((d.improvements||[]).join("；"));
  return c;
}
function highlight(text, violations){
  let h=esc(text||"");
  const uniq={}, rank={high:3,mid:2,low:1};
  (violations||[]).forEach(v=>{ const w=v.text; if(!w)return; if(!uniq[w]||rank[v.severity]>rank[uniq[w]]) uniq[w]=v.severity; });
  Object.keys(uniq).sort((a,b)=>b.length-a.length).forEach(w=>{
    const cls={high:"hl-high",mid:"hl-mid",low:"hl-low"}[uniq[w]]||"hl-low";
    h=h.split(esc(w)).join(`<mark class="${cls}">${esc(w)}</mark>`);
  });
  return h;
}
const DIM_LABEL={hook:"钩子",title:"标题",collect:"收藏",freshness:"新鲜度",seo:"搜索",completion:"完播",read:"读完",topic:"选题",interact:"互动",follow:"关注"};
const LEVEL_COLOR={"高潜力":"#33d17a","有潜力":"#5b8cff","一般":"#ffb347","难起量":"#ff5c5c"};
function render(d){
  const vs=d.violations||[], sc=d.score||{}, txt=d.corrected_text||"";
  let h=`<div class="rep">`;
  h+=`<h3>📋 违规自查（${esc(d.platform||"抖音")}）</h3>`;
  h+=`<div class="annot">`+(vs.length? highlight(txt,vs) : `<span class="none">✅ 全文未命中违禁词</span>\n\n`+esc(txt))+`</div>`;
  if(vs.length){
    h+=`<table class="hits"><tr><th>命中</th><th>类别</th><th>严重度</th><th>为什么 / 怎么改</th></tr>`;
    vs.forEach(v=>{ const t={high:"t-high",mid:"t-mid",low:"t-low"}[v.severity]||"t-low";
      const lab={high:"🔴高",mid:"🟠中",low:"🟡低"}[v.severity]||"🟡";
      const fix=[v.reason,v.suggest?("改："+v.suggest):"",v.note].filter(Boolean).map(esc).join("<br>");
      h+=`<tr><td>${esc(v.text)}</td><td>${esc(v.category||"")}</td><td><span class="tag ${t}">${lab}</span></td><td>${fix}</td></tr>`; });
    h+=`</table>`;
  } else { h+=`<div class="wl">未命中违禁词 ✅</div>`; }
  h+=`<div class="verdict">${esc(d.verdict||"")}</div>`;
  h+=`<h3>📈 流量潜力（仅文案维度）</h3>`;
  const lv=sc.level||"", col=LEVEL_COLOR[lv]||"#5b8cff";
  h+=`<div class="pred"><div class="rng" style="color:${col}">流量潜力 ${sc.total||0}% · ${esc(lv)}</div>`;
  if(sc.dims){ h+=`<div class="dims">`;
    Object.keys(DIM_LABEL).forEach(k=>{ if(sc.dims[k]==null)return; const val=sc.dims[k];
      h+=`<div class="dimrow"><span class="dimn">${DIM_LABEL[k]}</span><span class="dimbar"><i style="width:${val}%"></i></span><span class="dimv">${val}</span></div>`; });
    h+=`</div>`; }
  if(sc.summary) h+=`<div class="disc">${esc(sc.summary)}</div>`;
  h+=`</div>`;
  if((d.highlights||[]).length){ h+=`<h3>✨ 亮点</h3><ul class="good">`+d.highlights.map(x=>`<li>${esc(x)}</li>`).join("")+`</ul>`; }
  if((d.improvements||[]).length){ h+=`<h3>🔧 改进建议</h3><ul class="weak">`+d.improvements.map(x=>`<li>${esc(x)}</li>`).join("")+`</ul>`; }
  h+=`</div>`;
  return h;
}

const BUCKETS=["<0.3x","0.3-1x","1-3x","3-10x",">10x"];
const BUCKET_LABEL={"<0.3x":"扑了","0.3-1x":"低于日常","1-3x":"正常~小爆","3-10x":"爆款",">10x":"现象级"};

async function loadAccounts(){

function startPredictBtn(btn){

function startPredict(){

  if(currentAccount){ doPredict(); return; }
  add("bot",`<div class="accform"><b>先建账号档案（只填一次，预测基准全靠它）</b>

async function createAccount(){

async function doPredict(){

        audit:{verdict:lastAuditData&&lastAuditData.verdict, score:lastAuditData&&lastAuditData.score}})}).then(r=>r.json());
    if(!j.success){ finishMsg(waiting,"bot","⚠️ "+esc(j.message)); return; }
    finishMsg(waiting,"bot",renderPredCard(j.data));
  }catch(e){ finishMsg(waiting,"bot","⚠️ 预测失败："+esc(String(e))); }
}
function bucketBars(dist, pick, actualBucket){
  let h="";
  BUCKETS.forEach(b=>{
    const v=dist[b]||0;
    h+=`<div class="brow${b===pick?" pick":""}"><span class="bn">${b}</span>
      <span class="bbar"><i style="width:${v}%"></i>${b===actualBucket?'<span class="hitmark"></span>':''}</span>
      <span class="bv">${v}%</span></div>`;
  });
  return h;
}
function renderPredCard(w){
  return `<div class="rep pcard"><h3>🔮 盲预测<span class="lock">🔒 已锁定 · 不可修改</span></h3>
    ${bucketBars(w.pred_dist, w.pred_bucket)}
    <div style="color:var(--dim);font-size:13px;margin-top:8px">
    判定：<b style="color:#fff">${esc(w.pred_bucket)}（${BUCKET_LABEL[w.pred_bucket]||""}）</b>
    · 预计播放约 <b style="color:#fff">${fmtNum(w.pred_center)}</b> · 置信度 ${esc(w.pred_confidence)}</div>
    <div class="disc">${esc(w.pred_reason||"")}</div>
    <div class="disc" style="margin-top:6px">发布后切到「📊 发布后」登记 → 满3天回来对账。预测已存档，赖不掉的那种。</div></div>`;
}

function statusCell(w){
  if(w._grp==="retro_due") return '<span class="st st-due">🔴 待复盘</span>';
  if(w._grp==="predicted") return '<span class="st st-wait">⏳ 待发布</span>';

  return w.hit_bucket? '<span class="st st-hit">✅ 命中</span>' : '<span class="st st-miss">❌ 未中</span>';
}
function actionCell(w){
  if(w._grp==="retro_due") return `<button class="abtn primary" onclick="toggleRetro('${w.id}')">填数复盘</button>`;
  if(w._grp==="predicted") return `<button class="abtn primary" onclick="doPublish('${w.id}')">✓ 我已发布</button>`;

function renderTable(g){
  $("#tabPost").classList.toggle("due", (g.retro_due||[]).length>0);
  const rows=[];
  ["retro_due","predicted","published","retroed"].forEach(grp=>{
    (g[grp]||[]).forEach(w=>{ w._grp=grp; rows.push(w); });
  });
  if(!rows.length){
    $("#postGroups").innerHTML='<div class="empty" style="margin:60px 0">还没有记录。去「发布前」自查一条文案并锁定盲预测，账本从那一刻开始。</div>';

  }

  rows.forEach(w=>{
    const dev = w.deviation_pct==null? "—" : (Math.round(w.deviation_pct*100)>0?"+":"")+Math.round(w.deviation_pct*100)+"%";
    h+=`<tr class="wrow"><td style="max-width:230px">${esc(w.text_snapshot.slice(0,22))}…<div class="sm">${esc((w.predicted_at||"").slice(5,16))}</div></td>
      <td>${esc(w.pred_bucket)}<div class="sm">约 ${fmtNum(w.pred_center)}</div></td>
      <td>${w.actual_plays!=null? fmtNum(w.actual_plays) : "—"}</td>
      <td>${dev}</td>
      <td>${statusCell(w)}</td>
      <td>${actionCell(w)}</td></tr>`;
    if(w._grp==="retro_due") h+=`<tr class="retroRow" id="rr_${w.id}" style="display:none"><td colspan="6">
      <div class="nums">去创作者中心抄数：
        <input id="p_${w.id}" type="number" placeholder="播放量*">
        <input id="l_${w.id}" type="number" placeholder="点赞">
        <input id="c_${w.id}" type="number" placeholder="评论">
        <input id="s_${w.id}" type="number" placeholder="转发">
        <button class="abtn primary" onclick="doRetro('${w.id}')">提交对账</button>
      </div></td></tr>`;
  });
  h+=`</table>`;
  $("#postGroups").innerHTML=h;
}

function addPost(cls, html, save){

  attachCopy(d);
  m.appendChild(d); d.scrollIntoView({behavior:"smooth", block:"end"});

    body:JSON.stringify({frame:"post", role:cls, html})}).catch(()=>{});

function buildPostCtx(){
  let c="你现在是「发布后复盘教练」：基于用户的预测对账记录回答为什么爆/为什么没起来、偏差趋势说明什么、下一条怎么调。直说结论，给可执行建议，别复述数据表。\n\n";
  if(currentAccount) c+=`账号：${currentAccount.name}（赛道 ${currentAccount.track||"未知"}，基准 ${currentAccount.baseline_median} × 系数 ${currentAccount.calib_factor}，校准样本 ${currentAccount.calib_samples}）\n`;
  if(lastWorksData){
    const g=lastWorksData;
    (g.retroed||[]).forEach(w=>{
      c+=`【已复盘】${w.text_snapshot.slice(0,30)}… 预测${w.pred_bucket}(约${w.pred_center}) 实际${w.actual_plays} 偏差${Math.round((w.deviation_pct||0)*100)}% ${w.hit_bucket?"命中":"未中"} 理由:${w.pred_reason||""}\n`;
    });
    (g.retro_due||[]).concat(g.published||[]).forEach(w=>{ c+=`【已发布待对账】${w.text_snapshot.slice(0,30)}… 预测${w.pred_bucket}\n`; });
    (g.predicted||[]).forEach(w=>{ c+=`【待发布】${w.text_snapshot.slice(0,30)}… 预测${w.pred_bucket}\n`; });
  }
  return c.slice(0, 6000);
}

  if(!j.success){ alert(j.message); return; }
  if(window._setCard){ window._setCard.remove(); window._setCard=null; }
  add("bot","✅ 钥匙已保存。要是还没登抖音，点右下角「抖音」小按钮扫个码；然后贴条链接或粘段文案试试。", true);
  refreshDouyin();
}

/* ============ 抖音登录（用户自己的号） ============ */
async function refreshDouyin(){
  const el=document.getElementById("dyChip"); if(!el) return;
  try{
    const j=await fetch("/api/douyin_status").then(r=>r.json());
    if(j.logged_in){ el.textContent="抖音：已登录 ✓"; el.classList.add("ok"); }
    else{ el.textContent="抖音：未登录 · 点我扫码"; el.classList.remove("ok"); }
  }catch(e){}
}
async function douyinLogin(btn){
  if(window._dyBusy) return; window._dyBusy=true;
  if(btn) btn.disabled=true;
  const el=document.getElementById("dyChip");
  if(el) el.textContent="抖音：扫码窗口已弹出，拿手机扫…";
  try{
    const j=await fetch("/api/douyin_login",{method:"POST"}).then(r=>r.json());
    add("bot", (j.success?"✅ ":"⚠️ ")+j.message, true);
  }catch(e){ add("bot","⚠️ 登录流程出错："+e, true); }
  window._dyBusy=false; if(btn) btn.disabled=false;
  refreshDouyin();
}

/* ============ 启动 ============ */
(function(){
  const chip=document.createElement("div");
  chip.id="dyChip"; chip.className="dychip"; chip.textContent="抖音：查询中…";
  chip.onclick=()=>{ if(!chip.classList.contains("ok")) douyinLogin(null); };
  document.body.appendChild(chip);
})();
loadAccounts();
restoreChat();
restorePostChat();
checkSettings();
refreshDouyin();
fetch("/api/works").then(r=>r.json()).then(j=>{
  if(j.success) $("#tabPost").classList.toggle("due",(j.data.retro_due||[]).length>0);
}).catch(()=>{});
</script>
